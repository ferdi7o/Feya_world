<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Сървърна грешка | FeyaWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-card { text-align: center; padding: 40px; background: white; border-radius: 30px; shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .error-code { font-size: 100px; font-weight: 900; color: #4a6cf7; margin-bottom: 0; }
        .btn-home { background: #4a6cf7; color: white; border-radius: 50px; padding: 12px 30px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .btn-home:hover { background: #3a5bd9; color: white; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="error-card shadow-lg">
                    <h1 class="error-code">500</h1>
                    <h2 class="fw-bold mb-3">Опа! Нещо се обърка.</h2>
                    <p class="text-muted mb-4 fs-5">Изглежда нашият сървър има малка почивка. Не се притеснявайте, нашите техници вече работят по въпроса!</p>
                    <a href="/" class="btn-home d-inline-block shadow-sm">Назад към началната страница</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
