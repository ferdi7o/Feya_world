{% extends 'base.html' %}

{% block title %}Вход - Печатница{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Вход в системата</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Влез</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <p>Нямате профил? <a href="{% url 'register' %}">Регистрирайте се тук</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
